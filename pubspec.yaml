name: cashewpro_erp
description: "CashewPro ERP - Complete Cashew Factory Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # State Management & Routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1
  socket_io_client: ^3.0.2

  # Local Database
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.34
  path_provider: ^2.1.6
  path: ^1.9.1

  # Storage & Security
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.71.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  mobile_scanner: ^7.0.2
  url_launcher: ^6.3.1

  # PDF
  pdf: ^3.12.0
  printing: ^5.14.2

  # JSON
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  riverpod_generator: ^2.6.3
  drift_dev: ^2.28.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
