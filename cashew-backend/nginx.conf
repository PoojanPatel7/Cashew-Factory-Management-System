events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone for login route
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

    # Redirect HTTP to HTTPS (Uncomment in production when SSL is ready)
    # server {
    #     listen 80;
    #     server_name api.cashewpro.app;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80; # Change to 443 ssl in production
        server_name localhost; # Change to api.cashewpro.app

        # ssl_certificate /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/auth/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://cashew-backend:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://cashew-backend:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for machinery telemetry
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
